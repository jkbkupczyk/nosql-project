services:
  mongo:
    image: mongo:latest
    restart: always
    container_name: nosql-project
    environment:
      MONGO_INITDB_DATABASE: payment_arch
    healthcheck:
      test: |
        mongosh --eval "rs.status()"
      interval: 5s
      timeout: 30s
      retries: 30
    command: [ "--replSet", "rs0" ] # ChangeStreams requires https://www.mongodb.com/docs/manual/tutorial/deploy-replica-set/
    ports:
      - "27017:27017"
    volumes:
      - ./init-data/init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro